services:
  backend:
    build: ./backend
    restart: always
    environment:
      - DATABASE_URL=sqlite:////app/data/database.db
      - SECRET_KEY=diego-super-secret-key-123
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
      - FRONTEND_URL=https://dbtech.cloud
    volumes:
      - ./backend/data:/app/data
    networks:
      - portfolio-network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_BACKEND_URL=https://dbtech.cloud/api
        - VITE_SITE_URL=https://dbtech.cloud
    networks:
      - portfolio-network

  nginx:
    build: ./nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf.prod:/etc/nginx/conf.d/default.conf:ro
      - ./backend/static/uploads:/app/static/uploads:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    networks:
      - portfolio-network

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  certbot-etc:
  certbot-var:
  webroot:
