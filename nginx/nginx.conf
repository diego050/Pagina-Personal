server {
    listen 80;
    server_name dbtech.cloud;

    # Frontend - Serve static files
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Backend - Proxy API requests
    location /api {
        proxy_pass http://backend:8000/api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Robots.txt and Sitemap.xml proxy
    location = /robots.txt {
        proxy_pass http://backend:8000/robots.txt;
    }

    location = /sitemap.xml {
        proxy_pass http://backend:8000/sitemap.xml;
    }

    # Static Media - Serve directly for performance
    location /static/uploads {
        alias /app/static/uploads;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
