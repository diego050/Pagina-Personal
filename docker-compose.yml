services:
  backend:
    build: ./backend
    container_name: portfolio-backend
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/database.db:/app/database.db
      - ./backend/static/uploads:/app/static/uploads
    expose:
      - "8000"
    networks:
      - portfolio-network

  frontend:
    build:
      context: ./frontend
      args:
        # Change this to your public domain when deploying
        - VITE_BACKEND_URL=https://diegovelazquez.dev/api
    container_name: portfolio-frontend
    networks:
      - portfolio-network

  nginx:
    image: nginx:alpine
    container_name: portfolio-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/static/uploads:/app/static/uploads:ro
      # This volume should be shared with the frontend build output
      # A simple way for a portfolio is to copy files, 
      # but here we'll use the frontend container's built files.
    depends_on:
      - backend
      - frontend
    volumes_from:
      - frontend:ro
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge
