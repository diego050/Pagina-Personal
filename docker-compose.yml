services:
  backend:
    build: ./backend
    container_name: portfolio-backend
    restart: always
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/database.db:/app/database.db
      - ./backend/static/uploads:/app/static/uploads
    expose:
      - "8000"
    networks:
      - portfolio-network

  frontend:
    build:
      context: ./frontend
      args:
        # Change this to your public domain when deploying
        - VITE_BACKEND_URL=https://dbtech.cloud/api
    container_name: portfolio-frontend
    networks:
      - portfolio-network

  nginx:
    image: nginx:alpine
    container_name: portfolio-gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./backend/static/uploads:/app/static/uploads:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt:ro
      - webroot:/var/www/certbot:ro
    depends_on:
      - backend
      - frontend
    volumes_from:
      - frontend:ro
    networks:
      - portfolio-network

  certbot:
    image: certbot/certbot
    container_name: portfolio-certbot
    volumes:
      - certbot-etc:/etc/letsencrypt
      - certbot-var:/var/lib/letsencrypt
      - webroot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - portfolio-network

networks:
  portfolio-network:
    driver: bridge

volumes:
  certbot-etc:
  certbot-var:
  webroot:
